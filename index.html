<!DOCTYPE html>
<html>
<head>
    <title>DevOps Demo</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            text-align: center;
            margin-top: 100px;
        }

        .container {
            background-color: white;
            width: 60%;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #0077cc;
        }

        p {
            font-size: 18px;
            color: #555;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #0077cc;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn:hover {
            background-color: #005fa3;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hello DevOps Engineers!</h1>
        <p>Application deployed using Jenkins, Docker, and GitHub.</p>
        <p>Welcome to my DevOps Demo Project.</p>

        <a href="#" class="btn">Learn More</a>
    </div>

</body>
</html>
